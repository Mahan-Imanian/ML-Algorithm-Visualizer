<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Cockpit Side Panel</title>
  <style>
    :root { color-scheme: dark; --bg:#070b12; --panel:#111827; --line:rgba(139,164,205,.18); --text:#eef5ff; --muted:#8da0ba; --cyan:#42b8f5; --violet:#8b6cf6; --amber:#ffd166; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: var(--text); background: var(--bg); }
    main { padding: 14px; }
    h1 { margin: 0 0 4px; font-size: 16px; }
    p { margin: 0 0 14px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    section { border: 1px solid var(--line); background: var(--panel); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
    h2 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .metric { display: grid; grid-template-columns: 1fr auto; padding: 8px 0; border-top: 1px solid var(--line); font-size: 13px; }
    .metric:first-of-type { border-top: 0; }
    .metric strong { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; color: var(--amber); }
    a { height: 38px; border-radius: 11px; color: #04101a; background: linear-gradient(135deg, var(--cyan), #8ad9ff); text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Trace Inspector</h1>
    <p>Compact extension surface for replay state, shortcuts, and local run status.</p>
    <section>
      <h2>Last run</h2>
      <div class="metric"><span>Status</span><strong>local</strong></div>
      <div class="metric"><span>Mode</span><strong>trace</strong></div>
      <div class="metric"><span>Shortcut</span><strong>⌘K</strong></div>
    </section>
    <section>
      <h2>Quick keys</h2>
      <div class="metric"><span>Run / pause</span><strong>Space</strong></div>
      <div class="metric"><span>Step</span><strong>→</strong></div>
      <div class="metric"><span>Command</span><strong>⌘K</strong></div>
    </section>
    <a href="index.html" target="_blank">Open full cockpit</a>
  </main>
</body>
</html>
