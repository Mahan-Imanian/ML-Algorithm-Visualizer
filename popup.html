<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Cockpit Popup</title>
  <style>
    :root { color-scheme: dark; --bg:#070b12; --panel:#111827; --line:rgba(139,164,205,.18); --text:#eef5ff; --muted:#8da0ba; --cyan:#42b8f5; --amber:#ffd166; }
    body { width: 380px; margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: var(--text); background: var(--bg); }
    main { padding: 14px; }
    h1 { margin: 0 0 4px; font-size: 16px; }
    p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .grid { display: grid; gap: 8px; margin-top: 14px; }
    a, button { height: 40px; border-radius: 12px; border: 1px solid var(--line); color: var(--text); background: var(--panel); text-decoration: none; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; font-weight: 650; }
    a.primary { color: #04101a; background: linear-gradient(135deg, var(--cyan), #8ad9ff); border: 0; }
    small { color: var(--amber); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
  </style>
</head>
<body>
  <main>
    <h1>Algorithm Cockpit</h1>
    <p>Resume the local workbench or jump straight into a trace.</p>
    <div class="grid">
      <a class="primary" href="index.html" target="_blank">Open workbench <small>↵</small></a>
      <a href="index.html#learning" target="_blank">Machine learning <small>ML</small></a>
      <a href="index.html#run" target="_blank">Continue last run <small>Space</small></a>
      <a href="index.html#library" target="_blank">Open library <small>L</small></a>
      <a href="options.html" target="_blank">Settings <small>⌘,</small></a>
    </div>
  </main>
</body>
</html>
